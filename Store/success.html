<body>
  <div class="result-wrap">
    <div class="result-icon ok"><i class="fas fa-circle-check"></i></div>
    <h1>Order confirmed</h1>
    <p>Thanks — your payment went through. A receipt and order confirmation are on their way to your inbox from Stripe.</p>
    <p>You'll get a second email with tracking once your order ships.</p>
    <p class="ref" id="ref"></p>
    <div class="result-actions">
      <a href="index.html" class="btn-primary">keep shopping</a>
      <a href="../index.html#home" class="btn-ghost">back to site</a>
    </div>
  </div>
  <script>
    // Clear the cart now the order is placed, and show the reference.
    try { localStorage.removeItem("store_cart_v1"); } catch (e) {}
    var sid = new URLSearchParams(location.search).get("session_id");
    if (sid) document.getElementById("ref").textContent = "Reference: " + sid;
  </script>
