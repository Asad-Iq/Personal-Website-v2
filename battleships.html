<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){
      var t = localStorage.getItem("theme") || "auto";
      var eff = t === "auto"
        ? (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark")
        : t;
      document.documentElement.setAttribute("data-theme", eff);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battleships — ARCADE</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ---- Battleships-specific styles ---- */
    :root {
      --sea: #0a1628;
      --sea-hover: #0d1f3a;
      --ship-color: #1a3a5c;
      --hit-color: var(--accent-red);
      --miss-color: #2a2a3d;
      --glow-green: 0 0 16px rgba(48,209,88,0.5);
    }

    .bs-page { display: flex; flex-direction: column; min-height: 100vh; }

    /* Phase screens */
    .bs-phase { display: none; flex-direction: column; align-items: center; padding: 1.5rem 1rem 2rem; gap: 1rem; flex: 1; }
    .bs-phase.active { display: flex; }

    /* ---- Ship placement phase ---- */
    .bs-place-layout {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 880px;
    }

    .bs-panel {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .bs-panel-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Grid */
    .bs-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      background: var(--sea);
      border: 2px solid var(--border);
      padding: 3px;
      position: relative;
      user-select: none;
    }

    /* Row/column labels */
    .bs-grid-wrap { position: relative; padding-left: 22px; padding-top: 22px; }
    .bs-col-labels, .bs-row-labels {
      position: absolute;
      display: flex;
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--text-dim);
      letter-spacing: 0;
    }
    .bs-col-labels { top: 4px; left: 25px; gap: 3px; }
    .bs-row-labels { left: 2px; top: 25px; flex-direction: column; gap: 3px; }
    .bs-col-labels span, .bs-row-labels span {
      width: clamp(24px, 4.5vw, 36px);
      height: clamp(24px, 4.5vw, 36px);
      display: flex; align-items: center; justify-content: center;
    }

    .bs-cell {
      width: clamp(24px, 4.5vw, 36px);
      height: clamp(24px, 4.5vw, 36px);
      background: var(--sea);
      border: 1px solid rgba(10,132,255,0.08);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .bs-cell:hover { background: var(--sea-hover); }
    .bs-cell.ship  { background: var(--ship-color); border-color: rgba(10,132,255,0.3); }
    .bs-cell.ship-preview { background: rgba(26,58,92,0.7); border-color: rgba(10,132,255,0.4); }
    .bs-cell.ship-preview.invalid { background: rgba(255,45,85,0.2); border-color: rgba(255,45,85,0.4); }

    /* Hit / Miss markers */
    .bs-cell.hit {
      background: var(--accent-red);
      border-color: var(--accent-red);
      box-shadow: var(--glow-red);
    }
    .bs-cell.hit::after {
      content: '✕';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: rgba(255,255,255,0.8);
    }
    .bs-cell.miss {
      background: var(--miss-color);
    }
    .bs-cell.miss::after {
      content: '·';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      font-size: 1.4rem;
    }
    .bs-cell.sunk { background: #5c1a1a; border-color: rgba(255,45,85,0.5); }
    .bs-cell.sunk::after { content: '✕'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 0.95rem; color: var(--accent-red); }

    /* Ships to place panel */
    .bs-ships-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 180px;
    }
    .bs-ship-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.4rem 0.6rem;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .bs-ship-item.selected {
      border-color: var(--accent-blue);
      color: var(--text);
      background: rgba(10,132,255,0.08);
    }
    .bs-ship-item.placed { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
    .bs-ship-visual {
      display: flex; gap: 2px;
    }
    .bs-ship-sq {
      width: 12px; height: 12px;
      background: var(--ship-color);
      border: 1px solid rgba(10,132,255,0.4);
    }

    /* Orientation toggle */
    .bs-orient-btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      padding: 0.35rem 0.8rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .bs-orient-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Battle phase */
    .bs-battle-layout {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    /* 2P handover screen */
    .bs-handover {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    .bs-handover.active { display: flex; }
    .bs-handover h2 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      letter-spacing: 0.1em;
    }
    .bs-handover p {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }
    .bs-handover-btn {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      padding: 0.75rem 2rem;
      background: transparent;
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      cursor: pointer;
      transition: all 0.2s;
    }
    .bs-handover-btn:hover { background: rgba(10,132,255,0.1); }

    /* Tooltip / last action */
    .bs-last-action {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      min-height: 1.2em;
    }

    /* Ships remaining indicator */
    .bs-ships-remain {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-align: center;
    }
    .bs-ships-remain strong { color: var(--text); }
  </style>

<body>
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="game-page bs-page">
    <div class="game-header">
      <a href="index.html#games" class="back-btn">← BACK</a>
      <div class="game-title-bar">
        <h1 style="color:var(--accent-blue);text-shadow:var(--glow-blue)">BATTLESHIPS</h1>
        <p class="subtitle">place · fire · sink</p>
      </div>
      <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀</button>
      <div class="mode-selector">
        <button class="mode-btn active" id="btn-vs-cpu" onclick="setMode('cpu')">VS CPU</button>
        <button class="mode-btn"        id="btn-vs-p2"  onclick="setMode('2p')">2 PLAYER</button>
      </div>
      </div>
    </div>

    <div class="status-bar">
      <span class="status-indicator" id="status-dot" style="background:var(--accent-blue)"></span>
      <span id="status-text">Place your ships to begin</span>
    </div>

    <!-- ============ PLACEMENT PHASE ============ -->
    <div class="bs-phase active" id="phase-place">
      <div class="bs-place-layout">
        <div class="bs-panel">
          <div class="bs-panel-title" id="place-title">Player 1 — Place your fleet</div>
          <div class="bs-grid-wrap">
            <div class="bs-col-labels" id="place-col-labels"></div>
            <div class="bs-row-labels" id="place-row-labels"></div>
            <div class="bs-grid" id="place-grid"></div>
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;">
            <button class="bs-orient-btn" onclick="toggleOrientation()">ROTATE [ <span id="orient-label">HORIZONTAL</span> ]</button>
            <button class="bs-orient-btn" onclick="autoPlace()">AUTO PLACE</button>
            <button class="bs-orient-btn" onclick="clearPlacement()">CLEAR</button>
          </div>
        </div>

        <div class="bs-panel">
          <div class="bs-panel-title">YOUR FLEET</div>
          <div class="bs-ships-list" id="ships-list"></div>
          <button class="reset-btn" id="confirm-placement" onclick="confirmPlacement()" style="display:none">[ CONFIRM FLEET ] →</button>
        </div>
      </div>
    </div>

    <!-- ============ HANDOVER SCREEN (2P) ============ -->
    <div class="bs-handover" id="phase-handover">
      <h2 id="handover-title" style="color:var(--accent-blue)">PLAYER 2</h2>
      <p id="handover-msg">Pass the device to Player 2.<br>Press ready when you are.</p>
      <button class="bs-handover-btn" onclick="handoverReady()">I'M READY →</button>
    </div>

    <!-- ============ BATTLE PHASE ============ -->
    <div class="bs-phase" id="phase-battle">
      <div class="bs-last-action" id="last-action"></div>
      <div class="bs-battle-layout">
        <!-- Enemy board -->
        <div class="bs-panel">
          <div class="bs-panel-title" id="enemy-board-title">Enemy Waters — Click to fire</div>
          <div class="bs-grid-wrap">
            <div class="bs-col-labels" id="enemy-col-labels"></div>
            <div class="bs-row-labels" id="enemy-row-labels"></div>
            <div class="bs-grid" id="enemy-grid"></div>
          </div>
          <div class="bs-ships-remain">Enemy ships remaining: <strong id="enemy-ships-left">5</strong></div>
        </div>
        <!-- Own board -->
        <div class="bs-panel">
          <div class="bs-panel-title" id="own-board-title">Your Waters</div>
          <div class="bs-grid-wrap">
            <div class="bs-col-labels" id="own-col-labels"></div>
            <div class="bs-row-labels" id="own-row-labels"></div>
            <div class="bs-grid" id="own-grid"></div>
          </div>
          <div class="bs-ships-remain">Your ships remaining: <strong id="own-ships-left">5</strong></div>
        </div>
      </div>
      <button class="reset-btn" onclick="startNewGame()">[ NEW GAME ]</button>
    </div>
  </div>

  <script>
    // ============================================================
    // CONSTANTS
    // ============================================================
    const GRID = 10;
    const COLS_LABELS = 'ABCDEFGHIJ'.split('');
    const ROWS_LABELS = '1234567890'.split('');
    const SHIPS_DEF = [
      { name: 'Carrier',    size: 5 },
      { name: 'Battleship', size: 4 },
      { name: 'Cruiser',    size: 3 },
      { name: 'Submarine',  size: 3 },
      { name: 'Destroyer',  size: 2 },
    ];

    let mode = 'cpu';
    // Two players' states
    let players = [null, null]; // each: { grid (flat 100), ships [] }
    let placingFor = 0; // 0 or 1
    let horizontal = true;
    let selectedShipIdx = 0;
    let placedShips = [[], []]; // per player, array of placed ship objects {cells:[]}

    let currentAttacker = 0;
    let gameOver = false;
    let cpuHuntMode = false, cpuHuntTargets = [];

    // ============================================================
    // SETUP
    // ============================================================
    function setMode(m) {
      mode = m;
      document.getElementById('btn-vs-cpu').classList.toggle('active', m === 'cpu');
      document.getElementById('btn-vs-p2').classList.toggle('active', m === '2p');
      startNewGame();
    }

    function startNewGame() {
      gameOver = false;
      placingFor = 0;
      horizontal = true;
      selectedShipIdx = 0;
      placedShips = [[], []];
      players = [
        { grid: Array(GRID * GRID).fill(0), ships: [] },
        { grid: Array(GRID * GRID).fill(0), ships: [] },
      ];
      cpuHuntMode = false; cpuHuntTargets = [];
      currentAttacker = 0;

      showPhase('place');
      buildLabels('place-col-labels','place-row-labels');
      buildPlaceGrid();
      buildShipsList();
      document.getElementById('place-title').textContent = 'Player 1 — Place your fleet';
      document.getElementById('orient-label').textContent = horizontal ? 'HORIZONTAL' : 'VERTICAL';
      document.getElementById('confirm-placement').style.display = 'none';
      setStatus('Place your ships — select a ship then click the grid', 'var(--accent-blue)');
    }

   function showPhase(id) {
      ['phase-place','phase-battle','phase-handover'].forEach(p => document.getElementById(p).classList.remove('active'));
      document.getElementById('phase-' + id).classList.add('active');
    }

    // ============================================================
    // GRID BUILDING HELPERS
    // ============================================================
    function buildLabels(colId, rowId) {
      const colEl = document.getElementById(colId);
      const rowEl = document.getElementById(rowId);
      colEl.innerHTML = ''; rowEl.innerHTML = '';
      COLS_LABELS.forEach(l => { const s = document.createElement('span'); s.textContent = l; colEl.appendChild(s); });
      ROWS_LABELS.forEach(l => { const s = document.createElement('span'); s.textContent = l; rowEl.appendChild(s); });
    }

    function buildPlaceGrid() {
      const grid = document.getElementById('place-grid');
      grid.innerHTML = '';
      const p = players[placingFor];
      for (let i = 0; i < GRID * GRID; i++) {
        const cell = document.createElement('div');
        cell.className = 'bs-cell';
        if (p.grid[i] === 1) cell.classList.add('ship');
        cell.dataset.idx = i;
        cell.addEventListener('click', () => placeShip(i));
        cell.addEventListener('mouseenter', () => previewShip(i, true));
        cell.addEventListener('mouseleave', () => previewShip(i, false));
        grid.appendChild(cell);
      }
    }

    function buildShipsList() {
      const list = document.getElementById('ships-list');
      list.innerHTML = '';
      SHIPS_DEF.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'bs-ship-item' + (i === selectedShipIdx ? ' selected' : '');
        item.id = 'ship-item-' + i;
        const placed = placedShips[placingFor].some(ps => ps.shipIdx === i);
        if (placed) item.classList.add('placed');
        const vis = document.createElement('div');
        vis.className = 'bs-ship-visual';
        for (let j = 0; j < s.size; j++) { const sq = document.createElement('div'); sq.className = 'bs-ship-sq'; vis.appendChild(sq); }
        item.appendChild(vis);
        item.appendChild(document.createTextNode(' ' + s.name + ' (' + s.size + ')'));
        item.addEventListener('click', () => {
          if (!placed) { selectedShipIdx = i; buildShipsList(); }
        });
        list.appendChild(item);
      });
    }

    function previewShip(idx, show) {
      // Clear old preview
      document.querySelectorAll('#place-grid .ship-preview, #place-grid .invalid').forEach(el => {
        el.classList.remove('ship-preview', 'invalid');
      });
      if (!show) return;
      const cells = getShipCells(idx, SHIPS_DEF[selectedShipIdx].size, horizontal);
      if (!cells) return;
      const valid = canPlace(cells, placingFor);
      cells.forEach(ci => {
        const el = document.querySelector(`#place-grid [data-idx="${ci}"]`);
        if (el) el.classList.add('ship-preview', valid ? '' : 'invalid');
      });
    }

    function getShipCells(startIdx, size, horiz) {
      const r = Math.floor(startIdx / GRID), c = startIdx % GRID;
      const cells = [];
      for (let i = 0; i < size; i++) {
        const nr = horiz ? r : r + i;
        const nc = horiz ? c + i : c;
        if (nr >= GRID || nc >= GRID) return null;
        cells.push(nr * GRID + nc);
      }
      return cells;
    }

    function canPlace(cells, playerIdx) {
      if (!cells) return false;
      const g = players[playerIdx].grid;
      return cells.every(ci => g[ci] === 0);
    }

    function placeShip(idx) {
      if (placedShips[placingFor].some(ps => ps.shipIdx === selectedShipIdx)) return;
      const size = SHIPS_DEF[selectedShipIdx].size;
      const cells = getShipCells(idx, size, horizontal);
      if (!cells || !canPlace(cells, placingFor)) return;

      cells.forEach(ci => players[placingFor].grid[ci] = 1);
      placedShips[placingFor].push({ shipIdx: selectedShipIdx, cells, sunk: false });

      // Auto-select next unplaced
      const next = SHIPS_DEF.findIndex((_, i) => i !== selectedShipIdx && !placedShips[placingFor].some(ps => ps.shipIdx === i));
      if (next !== -1) selectedShipIdx = next;

      buildPlaceGrid();
      buildShipsList();

      const allPlaced = SHIPS_DEF.every((_, i) => placedShips[placingFor].some(ps => ps.shipIdx === i));
      document.getElementById('confirm-placement').style.display = allPlaced ? 'block' : 'none';
      if (allPlaced) setStatus('All ships placed! Confirm your fleet when ready.', 'var(--accent-green)');
    }

    function toggleOrientation() {
      horizontal = !horizontal;
      document.getElementById('orient-label').textContent = horizontal ? 'HORIZONTAL' : 'VERTICAL';
    }

    function clearPlacement() {
      players[placingFor].grid = Array(GRID * GRID).fill(0);
      placedShips[placingFor] = [];
      selectedShipIdx = 0;
      buildPlaceGrid();
      buildShipsList();
      document.getElementById('confirm-placement').style.display = 'none';
    }

    function autoPlace() {
      clearPlacement();
      SHIPS_DEF.forEach((s, i) => {
        let placed = false;
        let attempts = 0;
        while (!placed && attempts < 500) {
          attempts++;
          const horiz = Math.random() < 0.5;
          const r = Math.floor(Math.random() * GRID);
          const c = Math.floor(Math.random() * GRID);
          const startIdx = r * GRID + c;
          const cells = getShipCells(startIdx, s.size, horiz);
          if (cells && canPlace(cells, placingFor)) {
            cells.forEach(ci => players[placingFor].grid[ci] = 1);
            placedShips[placingFor].push({ shipIdx: i, cells, sunk: false });
            placed = true;
          }
        }
      });
      selectedShipIdx = 0;
      buildPlaceGrid();
      buildShipsList();
      document.getElementById('confirm-placement').style.display = 'block';
      setStatus('Fleet auto-placed! Confirm when ready.', 'var(--accent-green)');
    }

    function confirmPlacement() {
      if (mode === 'cpu') {
        // CPU places its fleet randomly
        placingFor = 1;
        players[1].grid = Array(GRID * GRID).fill(0);
        placedShips[1] = [];
        selectedShipIdx = 0;
        SHIPS_DEF.forEach((s, i) => {
          let placed = false;
          while (!placed) {
            const horiz = Math.random() < 0.5;
            const r = Math.floor(Math.random() * GRID);
            const c = Math.floor(Math.random() * GRID);
            const cells = getShipCells(r * GRID + c, s.size, horiz);
            if (cells && canPlace(cells, 1)) {
              cells.forEach(ci => players[1].grid[ci] = 1);
              placedShips[1].push({ shipIdx: i, cells, sunk: false });
              placed = true;
            }
          }
        });
        startBattle();
      } else {
        // 2P: show handover for P2 placement
        if (placingFor === 0) {
          showPhase('handover');
          document.getElementById('handover-title').textContent = 'PLAYER 2';
          document.getElementById('handover-msg').innerHTML = 'Pass the device to Player 2.<br>Press ready when you are.';
          document.getElementById('phase-handover').dataset.next = 'place2';
        } else {
          startBattle();
        }
      }
    }

    function handoverReady() {
      const next = document.getElementById('phase-handover').dataset.next;
      if (next === 'place2') {
        placingFor = 1;
        players[1] = { grid: Array(GRID * GRID).fill(0), ships: [] };
        placedShips[1] = [];
        selectedShipIdx = 0;
        horizontal = true;
        showPhase('place');
        buildPlaceGrid();
        buildShipsList();
        document.getElementById('place-title').textContent = 'Player 2 — Place your fleet';
        document.getElementById('confirm-placement').style.display = 'none';
        setStatus('Player 2: Place your ships', 'var(--accent-blue)');
      } else if (next === 'battle-p2') {
        // Switch to P2's attack turn
        currentAttacker = 1;
        showPhase('battle'); // ADDED THIS LINE
        renderBattleBoards();
        setStatus("Player 2's turn — fire!", 'var(--accent-yellow)');
        document.getElementById('status-dot').style.background = 'var(--accent-yellow)';
      } else if (next === 'battle-p1') {
        currentAttacker = 0;
        showPhase('battle'); // ADDED THIS LINE
        renderBattleBoards();
        setStatus("Player 1's turn — fire!", 'var(--accent-blue)');
        document.getElementById('status-dot').style.background = 'var(--accent-blue)';
      }
    }

    // ============================================================
    // BATTLE PHASE
    // ============================================================
    // attackGrid[playerIdx] = flat 100-array: 0=unknown, 'H'=hit, 'M'=miss
    let attackGrids = [Array(GRID*GRID).fill(0), Array(GRID*GRID).fill(0)];

    function startBattle() {
      attackGrids = [Array(GRID*GRID).fill(0), Array(GRID*GRID).fill(0)];
      currentAttacker = 0;
      gameOver = false;
      showPhase('battle');
      buildLabels('enemy-col-labels','enemy-row-labels');
      buildLabels('own-col-labels','own-row-labels');
      renderBattleBoards();
      const p2name = mode === 'cpu' ? 'CPU' : 'Player 2';
      document.getElementById('enemy-board-title').textContent = `${p2name}'s Waters — Click to fire`;
      document.getElementById('own-board-title').textContent = 'Your Waters';
      setStatus("Player 1's turn — choose a target!", 'var(--accent-blue)');
    }

    function renderBattleBoards() {
      // Attacker fires at defender (1-attacker)
      const defender = 1 - currentAttacker;
      const atkGrid = attackGrids[currentAttacker]; // what attacker has seen of defender

      // Enemy grid (clickable, shows hits/misses, hides ships)
      const enemyEl = document.getElementById('enemy-grid');
      enemyEl.innerHTML = '';
      for (let i = 0; i < GRID * GRID; i++) {
        const cell = document.createElement('div');
        cell.className = 'bs-cell';
        const v = atkGrid[i];
        if (v === 'H') {
          const isSunk = isShipSunk(defender, i, atkGrid);
          cell.classList.add(isSunk ? 'sunk' : 'hit');
        } else if (v === 'M') {
          cell.classList.add('miss');
        } else if (!gameOver) {
          cell.addEventListener('click', () => fireAt(i));
          cell.addEventListener('mouseenter', () => cell.style.background = 'rgba(10,132,255,0.2)');
          cell.addEventListener('mouseleave', () => cell.style.background = '');
        }
        enemyEl.appendChild(cell);
      }

      // Own grid (shows own ships + enemy hits/misses)
      const ownEl = document.getElementById('own-grid');
      ownEl.innerHTML = '';
      const defenderAtkGrid = attackGrids[defender];
      for (let i = 0; i < GRID * GRID; i++) {
        const cell = document.createElement('div');
        cell.className = 'bs-cell';
        const ownVal = players[currentAttacker].grid[i];
        const atkVal = defenderAtkGrid[i];
        if (atkVal === 'H') { cell.classList.add(isShipSunk(currentAttacker, i, defenderAtkGrid) ? 'sunk' : 'hit'); }
        else if (atkVal === 'M') { cell.classList.add('miss'); }
        else if (ownVal === 1) { cell.classList.add('ship'); }
        ownEl.appendChild(cell);
      }

      // Ships remaining
      const enemyShipsLeft = placedShips[defender].filter(s => !s.sunk).length;
      const ownShipsLeft = placedShips[currentAttacker].filter(s => !s.sunk).length;
      document.getElementById('enemy-ships-left').textContent = enemyShipsLeft;
      document.getElementById('own-ships-left').textContent = ownShipsLeft;

      // Update labels
      const p2 = mode === 'cpu' ? 'CPU' : 'Player 2';
      const attackerName = currentAttacker === 0 ? 'Player 1' : p2;
      const defenderName = currentAttacker === 0 ? p2 : 'Player 1';
      document.getElementById('enemy-board-title').textContent = `${defenderName}'s Waters — Click to fire`;
      document.getElementById('own-board-title').textContent = `${attackerName}'s Waters`;
    }

    function isShipSunk(playerIdx, hitCell, atkGrid) {
      const ship = placedShips[playerIdx].find(s => s.cells.includes(hitCell));
      if (!ship) return false;
      return ship.cells.every(c => atkGrid[c] === 'H');
    }

    function fireAt(idx) {
      if (gameOver) return;
      const defender = 1 - currentAttacker;
      const atkGrid = attackGrids[currentAttacker];
      if (atkGrid[idx] !== 0) return;

      const isHit = players[defender].grid[idx] === 1;
      atkGrid[idx] = isHit ? 'H' : 'M';

      // Check sunk
      let sunkMsg = '';
      if (isHit) {
        const ship = placedShips[defender].find(s => s.cells.includes(idx) && !s.sunk);
        if (ship && ship.cells.every(c => atkGrid[c] === 'H')) {
          ship.sunk = true;
          sunkMsg = ` — ${SHIPS_DEF[ship.shipIdx].name} SUNK!`;
        }
      }

      const coord = COLS_LABELS[idx % GRID] + ROWS_LABELS[Math.floor(idx / GRID)];
      const p2 = mode === 'cpu' ? 'CPU' : 'Player 2';
      const attackerName = currentAttacker === 0 ? 'Player 1' : p2;
      document.getElementById('last-action').textContent = `${attackerName} fired at ${coord} — ${isHit ? 'HIT' : 'MISS'}${sunkMsg}`;

      // Check win
      if (placedShips[defender].every(s => s.sunk)) {
        gameOver = true;
        renderBattleBoards();
        setStatus(`${attackerName.toUpperCase()} WINS! All enemy ships sunk! 🎉`, 'var(--accent-green)');
        document.getElementById('status-dot').style.background = 'var(--accent-green)';
        document.getElementById('status-dot').style.animation = 'none';
        return;
      }

      // Switch turns
      if (mode === 'cpu' && currentAttacker === 0) {
        // CPU's turn
        setStatus("CPU is thinking...", 'var(--accent-yellow)');
        renderBattleBoards();
        setTimeout(cpuFire, 700);
      } else if (mode === '2p') {
        // Show handover screen
        const nextAttacker = 1 - currentAttacker;
        const nextName = nextAttacker === 0 ? 'Player 1' : p2;
        showPhase('handover');
        document.getElementById('handover-title').textContent = nextName.toUpperCase();
        document.getElementById('handover-msg').innerHTML = `Pass the device to ${nextName}.<br>Press ready when it's your turn.`;
        document.getElementById('phase-handover').dataset.next = nextAttacker === 0 ? 'battle-p1' : 'battle-p2';
        currentAttacker = nextAttacker;
      } else {
        // Back to player 1 after cpu fires (handled in cpuFire)
      }
    }

    function cpuFire() {
      if (gameOver) return;
      // CPU fires at player 0
      const atkGrid = attackGrids[1];
      let idx;

      if (cpuHuntTargets.length > 0) {
        idx = cpuHuntTargets.shift();
        while (atkGrid[idx] !== 0 && cpuHuntTargets.length > 0) idx = cpuHuntTargets.shift();
        if (atkGrid[idx] !== 0) idx = randomShot(atkGrid);
      } else {
        idx = randomShot(atkGrid);
      }

      const isHit = players[0].grid[idx] === 1;
      atkGrid[idx] = isHit ? 'H' : 'M';

      if (isHit) {
        // Add adjacent cells to hunt targets
        const r = Math.floor(idx / GRID), c = idx % GRID;
        [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
          if (nr>=0&&nr<GRID&&nc>=0&&nc<GRID) {
            const ni = nr*GRID+nc;
            if (atkGrid[ni] === 0 && !cpuHuntTargets.includes(ni)) cpuHuntTargets.push(ni);
          }
        });

        const ship = placedShips[0].find(s => s.cells.includes(idx) && !s.sunk);
        if (ship && ship.cells.every(c => atkGrid[c] === 'H')) {
          ship.sunk = true;
          cpuHuntTargets = []; // reset hunt after sinking
        }
      }

      const coord = COLS_LABELS[idx % GRID] + ROWS_LABELS[Math.floor(idx / GRID)];
      document.getElementById('last-action').textContent = `CPU fired at ${coord} — ${isHit ? 'HIT!' : 'MISS'}`;

      if (placedShips[0].every(s => s.sunk)) {
        gameOver = true;
        currentAttacker = 1;
        renderBattleBoards();
        setStatus('CPU WINS! Your fleet has been sunk!', 'var(--accent-red)');
        document.getElementById('status-dot').style.background = 'var(--accent-red)';
        document.getElementById('status-dot').style.animation = 'none';
        return;
      }

      currentAttacker = 0;
      renderBattleBoards();
      setStatus("Player 1's turn — choose a target!", 'var(--accent-blue)');
    }

    function randomShot(atkGrid) {
      // Parity-based shooting (more efficient)
      const candidates = [];
      for (let i = 0; i < GRID * GRID; i++) {
        if (atkGrid[i] === 0) {
          const r = Math.floor(i/GRID), c = i % GRID;
          if ((r + c) % 2 === 0) candidates.push(i); // checkerboard pattern
        }
      }
      if (candidates.length === 0) {
        // Fallback to any unshot cell
        for (let i = 0; i < GRID * GRID; i++) if (atkGrid[i] === 0) return i;
      }
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function setStatus(msg, color) {
      document.getElementById('status-text').textContent = msg;
      if (color) document.getElementById('status-dot').style.background = color;
    }

    startNewGame();
  
  // ── Theme: read from localStorage (set by main site), cycle on click
  (function(){
    var root = document.documentElement;
    var btn  = document.getElementById("theme-toggle");
    var THEMES = ["dark","light","auto"];
    var ICONS  = {dark:"☾", light:"☀", auto:"◑"};

    function applyTheme(t){
      var eff = t==="auto"
        ? (window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark")
        : t;
      root.setAttribute("data-theme", eff);
      localStorage.setItem("theme", t);
      btn.textContent = ICONS[t];
      btn.title = t + " mode";
    }

    btn.addEventListener("click", function(){
      var cur = localStorage.getItem("theme")||"dark";
      var next = THEMES[(THEMES.indexOf(cur)+1)%THEMES.length];
      applyTheme(next);
    });

    // Re-apply on load to set button icon correctly
    var cur = localStorage.getItem("theme")||"auto";
    btn.textContent = ICONS[cur]||"☀";
    btn.title = cur + " mode";

    window.matchMedia("(prefers-color-scheme:light)").addEventListener("change",function(){
      if(localStorage.getItem("theme")==="auto") applyTheme("auto");
    });
  })();

</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").then(function (reg) {
        // When a new service worker is found, activate it on next load.
        reg.addEventListener("updatefound", function () {
          var sw = reg.installing;
          sw && sw.addEventListener("statechange", function () {
            if (sw.state === "installed" && navigator.serviceWorker.controller) {
              sw.postMessage("SKIP_WAITING");
            }
          });
        });
      }).catch(function (err) {
        console.warn("Service worker registration failed:", err);
      });
    });
  }
</script>
