# Place this file at the TOP LEVEL of your project
# (same folder as your main index.html — NOT inside Store).

[build]
  # Serve the whole site so the store's ../main-style.css and ../index.html links work
  publish = "."
  # Where the serverless function lives
  functions = "Store/netlify/functions"

[functions]
  node_bundler = "esbuild"
