<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16181d">
  <title>Offline · Asad Iqbal</title>
  <style>
    :root { --bg:#16181d; --fg:#f4f1ea; --muted:#9a9a9a; --red:#c20000; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0.5rem;
    }
    .logo { font-size: 3.5rem; font-weight: 600; letter-spacing: 1px; }
    .logo .dot { color: var(--red); }
    h1 { font-size: 1.9rem; font-weight: 400; margin: 1rem 0 0.25rem; }
    p { color: var(--muted); max-width: 32ch; line-height: 1.5; font-size: 1.15rem; margin: 0; }
    button {
      margin-top: 1.75rem;
      background: transparent;
      color: var(--fg);
      border: 1px solid rgba(244,241,234,0.3);
      padding: 0.7rem 1.6rem;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.2s, color 0.2s;
    }
    button:hover { border-color: var(--red); color: var(--red); }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#16181d">

<!-- Icons / favicons -->
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- iOS standalone behaviour -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asad Iqbal">
</head>
<body>
  <div class="logo">A<span class="dot">.</span></div>
  <h1>You're offline</h1>
  <p>This page isn't cached yet. Reconnect and try again — pages you've already visited will still work offline.</p>
  <button onclick="location.reload()">retry</button>
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").then(function (reg) {
        // When a new service worker is found, activate it on next load.
        reg.addEventListener("updatefound", function () {
          var sw = reg.installing;
          sw && sw.addEventListener("statechange", function () {
            if (sw.state === "installed" && navigator.serviceWorker.controller) {
              sw.postMessage("SKIP_WAITING");
            }
          });
        });
      }).catch(function (err) {
        console.warn("Service worker registration failed:", err);
      });
    });
  }
</script>
</body>
</html>
